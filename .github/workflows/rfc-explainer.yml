name: RFC Explainer

on:
  push:
    branches: [ main ]
    paths:
      - "docs/rfc/site/**"
      - "docs/rfc/README.md"
      - ".github/workflows/rfc-explainer.yml"
  pull_request:
    paths:
      - "docs/rfc/site/**"
      - "docs/rfc/README.md"
      - ".github/workflows/rfc-explainer.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: docs/rfc/site

jobs:
  test:
    name: Tests + generate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/rfc/site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit + contract tests
        run: npm test

      - name: Generate the site
        run: npm run build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/rfc/site/dist

  # Publishes the generated explainer to GitHub Pages. Requires Pages to be
  # enabled for the repo with "Source: GitHub Actions" (Settings -> Pages).
  deploy:
    name: Deploy to Pages
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
