name: Docs

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  reference-up-to-date:
    name: Reference up to date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Regenerate the reference docs
        run: ./scripts/gen-reference.sh

      - name: Fail if docs/reference drifted from the schema
        run: |
          if ! git diff --quiet -- docs/reference; then
            echo "::error::docs/reference is stale. Run scripts/gen-reference.sh and commit the result."
            git --no-pager diff -- docs/reference
            exit 1
          fi
          echo "docs/reference is up to date with the installed schema."

  subsystem-map-up-to-date:
    name: Subsystem map up to date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Regenerate the subsystem map
        run: ./scripts/gen-subsystem-map.sh

      - name: Fail if the subsystem map drifted from the schema
        run: |
          if ! git diff --quiet -- docs/reference/subsystem-map.md; then
            echo "::error::docs/reference/subsystem-map.md is stale. Run scripts/gen-subsystem-map.sh and commit the result."
            git --no-pager diff -- docs/reference/subsystem-map.md
            exit 1
          fi
          echo "docs/reference/subsystem-map.md is up to date with the installed schema."

  doctests:
    name: Doctests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run documentation doctests
        run: ./scripts/run-doctests.sh

  links:
    name: Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check internal markdown links resolve
        run: python3 scripts/check-links.py .
