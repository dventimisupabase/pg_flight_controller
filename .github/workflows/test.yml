name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: PostgreSQL ${{ matrix.pg_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: [15, 16, 17, 18]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run tests on PostgreSQL ${{ matrix.pg_version }}
        run: ./test.sh ${{ matrix.pg_version }}

  # Prove the documented UPGRADE path (latest release tag -> HEAD), which test.sh's
  # fresh-install-only flow cannot exercise. fetch-depth: 0 so git describe/show see tags.
  upgrade:
    name: Upgrade PostgreSQL ${{ matrix.pg_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: [15, 16, 17, 18]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Upgrade from the latest release tag on PostgreSQL ${{ matrix.pg_version }}
        run: ./upgrade.sh ${{ matrix.pg_version }}

  # Single stable status check to require in branch protection.
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, upgrade]
    if: always()
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Tests failed on one or more PostgreSQL versions"
            exit 1
          fi
          if [ "${{ needs.upgrade.result }}" != "success" ]; then
            echo "Upgrade-path test failed on one or more PostgreSQL versions"
            exit 1
          fi
          echo "All PostgreSQL versions passed (fresh install + upgrade)"
