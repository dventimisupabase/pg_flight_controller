# Extension-specific mounts, merged over the root docker-compose.yml by test.sh.
# Volume source paths are relative to the project root (the first -f file's dir).
services:
  db:
    volumes:
      - ./pgfc_observe/install.sql:/sql/pgfc_observe/install.sql:ro
      - ./pgfc_observe/uninstall.sql:/sql/pgfc_observe/uninstall.sql:ro
      - ./pgfc_observe/tests:/sql/pgfc_observe/tests:ro
